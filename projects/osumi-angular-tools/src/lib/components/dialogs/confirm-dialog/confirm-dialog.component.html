<h1 mat-dialog-title>{{ title() }}</h1>
<div mat-dialog-content>
	<p>{{ content() }}</p>
</div>
<div mat-dialog-actions
	 align="end">
	<button type="button"
			mat-button
			(click)="close(false)">{{ cancel() }}</button>
	<button type="button"
			mat-flat-button
			[ngClass]="{'dialogs-warn': warn()}"
			(click)="close(true)">{{ ok() }}</button>
</div>
